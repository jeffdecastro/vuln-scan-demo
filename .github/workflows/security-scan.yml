name: Security Scan

# When does this run?
on:
  push:
    branches: [ main ]        # every push to main
  pull_request:
    branches: [ main ]        # every PR targeting main
  schedule:
    - cron: '0 13 * * 1'      # every Monday 13:00 UTC (catches newly disclosed CVEs)
  workflow_dispatch:          # adds a manual "Run workflow" button — use this in the demo

# Permissions the job needs. security-events:write is REQUIRED to upload results
# to the Security tab.
permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    name: Trivy dependency + filesystem scan
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      # Step A: full scan, output SARIF, DO NOT fail here (we want the results uploaded)
      - name: Run Trivy (report findings)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'                # scan the filesystem / dependency manifests
          scan-ref: '.'
          format: 'sarif'                # SARIF is the format the Security tab understands
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: false

      # Step B: push those results into the GitHub Security tab
      - name: Upload results to the Security tab
        uses: github/codeql-action/upload-sarif@08d09a53f0f5d694f253bd25732e4429c9e9337f # v3.37.2
        if: always()                     # upload even if a later step fails
        with:
          sarif_file: 'trivy-results.sarif'

      # Step C: the GATE. Re-run Trivy but this time fail the build on CRITICAL.
      - name: Fail the build on CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'                # human-readable output in the logs
          severity: 'CRITICAL'
          exit-code: '1'                 # non-zero exit = the whole workflow fails
          ignore-unfixed: false
