version: 2
updates:
  # Keep Python dependencies patched
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10

  # Also keep the ACTIONS in your workflow up to date (ties into hardening, Part 7)
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
